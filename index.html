<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liêu Hải Taxi Service - Lịch Sử</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; padding: 15px; }
        .container { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        .info-display { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 12px; margin: 15px 0; }
        .history-card { background: #fff; border-left: 4px solid #2E8B57; padding: 10px; margin-top: 10px; font-size: 0.85rem; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn { width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; margin-bottom: 8px; transition: 0.2s; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-xl font-bold text-center text-blue-800 mb-4">🚕 LIÊU HẢI TAXI SERVICE</h1>
        
        <div class="mb-4">
            <label class="block text-sm font-semibold mb-1">Giá cước (VND/Km):</label>
            <input type="number" id="farePerKm" value="10000" class="w-full p-2 border rounded">
        </div>

        <div class="info-display">
            <p>🛣️ <b>Quãng đường:</b> <span id="distance">0.00</span> km</p>
            <p>💰 <b>Số tiền:</b> <span id="totalFare" class="text-green-600 font-bold">0</span> VND</p>
            <p id="statusMessage" class="text-xs text-orange-500 mt-2 font-medium italic text-center">Đang chờ khởi động...</p>
        </div>

        <button id="stopButton" class="btn bg-red-500 text-white" style="display:none;">KẾT THÚC & LƯU</button>
        <button id="resetButton" class="btn bg-gray-200 text-gray-700">ĐẶT LẠI MỚI</button>

        <div class="mt-6">
            <h2 class="font-bold text-gray-700 border-b pb-2">📜 Lịch sử hôm nay</h2>
            <div id="historyList" class="max-h-60 overflow-y-auto mt-2"></div>
            <button id="clearHistory" class="text-xs text-red-400 mt-4 underline">Xóa lịch sử</button>
        </div>
    </div>

    <script>
        const farePerKmInput = document.getElementById('farePerKm');
        const distanceDisplay = document.getElementById('distance');
        const totalFareDisplay = document.getElementById('totalFare');
        const statusMessage = document.getElementById('statusMessage');
        const stopButton = document.getElementById('stopButton');
        const historyList = document.getElementById('historyList');

        let watchId, totalDistance = 0, lastLat = null, lastLon = null, isTracking = false;

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function startTracking() {
            if (isTracking) return;
            isTracking = true;
            statusMessage.textContent = "🛰️ Đang kết nối GPS...";
            stopButton.style.display = 'block';
            
            watchId = navigator.geolocation.watchPosition(
                (pos) => {
                    const { latitude, longitude, accuracy } = pos.coords;
                    if (accuracy > 70) {
                        statusMessage.textContent = `⚠️ Sóng yếu (${Math.round(accuracy)}m)`;
                        return;
                    }
                    if (lastLat !== null) {
                        const delta = calculateDistance(lastLat, lastLon, latitude, longitude);
                        if (delta > 0.007) totalDistance += delta;
                    }
                    lastLat = latitude; lastLon = longitude;
                    statusMessage.textContent = "✅ Đang theo dõi hành trình...";
                    distanceDisplay.textContent = totalDistance.toFixed(2);
                    totalFareDisplay.textContent = Math.round(totalDistance * farePerKmInput.value).toLocaleString('vi-VN');
                },
                (err) => { statusMessage.textContent = "❌ Lỗi: " + err.message; },
                { enableHighAccuracy: true }
            );
        }

        function saveToHistory() {
            if (totalDistance < 0.1) return;
            const history = JSON.parse(localStorage.getItem('taxiHistory') || '[]');
            const trip = {
                time: new Date().toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit'}),
                km: totalDistance.toFixed(2),
                money: Math.round(totalDistance * farePerKmInput.value).toLocaleString('vi-VN')
            };
            history.unshift(trip);
            localStorage.setItem('taxiHistory', JSON.stringify(history.slice(0, 20))); // Lưu 20 chuyến gần nhất
            renderHistory();
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('taxiHistory') || '[]');
            historyList.innerHTML = history.map(t => `
                <div class="history-card">
                    <b>${t.time}</b>: ${t.km} km - <span class="text-green-700">${t.money}đ</span>
                </div>
            `).join('');
        }

        stopButton.addEventListener('click', () => {
            saveToHistory();
            navigator.geolocation.clearWatch(watchId);
            isTracking = false;
            statusMessage.textContent = "🏁 Đã lưu chuyến đi.";
            stopButton.style.display = 'none';
        });

        document.getElementById('resetButton').addEventListener('click', () => location.reload());
        document.getElementById('clearHistory').addEventListener('click', () => {
            if(confirm('Xóa hết lịch sử?')) { localStorage.removeItem('taxiHistory'); renderHistory(); }
        });

        window.onload = () => {
            renderHistory();
            setTimeout(startTracking, 2000); 
        };
    </script>
</body>
</html>
