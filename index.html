<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liêu Hải Taxi Service - Always On</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; padding: 10px; color: white; }
        .container { background: #1e293b; padding: 20px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); max-width: 480px; margin: auto; border: 1px solid #334155; }
        .input-box { background: #334155; border: 1px solid #475569; padding: 12px; border-radius: 12px; margin-bottom: 10px; }
        .label-text { font-size: 0.75rem; font-weight: 600; color: #94a3b8; display: block; margin-bottom: 4px; text-transform: uppercase; }
        .price-input { width: 100%; background: transparent; border: none; font-size: 1.1rem; font-weight: bold; color: #f8fafc; outline: none; }
        .display-area { background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%); padding: 20px; border-radius: 20px; margin: 15px 0; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); }
        .btn { width: 100%; padding: 16px; border-radius: 14px; font-weight: 800; text-transform: uppercase; transition: 0.3s; }
        .history-item { border-left: 4px solid #38bdf8; padding: 10px; background: #334155; margin-top: 8px; border-radius: 8px; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-xl font-black text-center text-sky-400 mb-4 tracking-widest">🚕 LIÊU HẢI LIMO GREEN</h1>
        
        <div class="grid grid-cols-2 gap-2">
            <div class="input-box">
                <span class="label-text">Cầu đường</span>
                <input type="number" id="tollFee" value="0" class="price-input">
            </div>
            <div class="input-box">
                <span class="label-text">Bến bãi</span>
                <input type="number" id="parkingFee" value="0" class="price-input">
            </div>
        </div>
        <div class="input-box">
            <span class="label-text">Phí chờ (VND)</span>
            <input type="number" id="waitingFee" value="0" class="price-input">
        </div>

        <div class="display-area">
            <div class="flex justify-between items-end">
                <div>
                    <p class="text-[10px] uppercase font-bold opacity-80">Quãng đường</p>
                    <p class="text-4xl font-black"><span id="distance">0.00</span> <span class="text-lg">km</span></p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] uppercase font-bold opacity-80">Tổng tiền</p>
                    <p class="text-4xl font-black text-yellow-300" id="totalFare">0</p>
                </div>
            </div>
            <p id="statusMessage" class="text-[10px] mt-4 opacity-80 italic text-center">Đang chuẩn bị...</p>
        </div>

        <button id="stopButton" class="btn bg-red-500 hover:bg-red-600 shadow-lg" style="display:none;">KẾT THÚC & LƯU</button>
        <button id="resetButton" class="btn bg-slate-700 text-slate-300 mt-2">LÀM MỚI</button>

        <div class="mt-6">
            <h2 class="font-bold text-slate-400 border-b border-slate-700 pb-2 flex justify-between">
                <span>📜 HÔM NAY</span>
                <span id="clearHistory" class="text-red-400 text-xs cursor-pointer">Xóa</span>
            </h2>
            <div id="historyList" class="max-h-40 overflow-y-auto mt-2"></div>
        </div>
    </div>

    <script>
        const inputs = ['tollFee', 'parkingFee', 'waitingFee'];
        const elements = {};
        inputs.concat(['distance', 'totalFare', 'statusMessage', 'stopButton', 'historyList']).forEach(id => {
            elements[id] = document.getElementById(id);
        });

        let watchId, totalDistance = 0, lastLat = null, lastLon = null, isTracking = false;
        let wakeLock = null;

        // Tính năng giữ màn hình sáng
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    elements.statusMessage.textContent += " + Đã khóa màn hình sáng";
                }
            } catch (err) {
                console.log("Wake Lock lỗi: " + err.message);
            }
        }

        function calculateTaxiFare(km) {
            let fare = 0;
            if (km <= 10) fare = 200000;
            else if (km <= 50) fare = 200000 + (km - 10) * 12000;
            else if (km <= 100) fare = 200000 + (40 * 12000) + (km - 50) * 10000;
            else fare = 200000 + (40 * 12000) + (50 * 10000) + (km - 100) * 9000;
            return Math.round(fare);
        }

        function updateDisplay() {
            const extra = (parseFloat(elements.tollFee.value) || 0) + 
                          (parseFloat(elements.parkingFee.value) || 0) + 
                          (parseFloat(elements.waitingFee.value) || 0);
            const finalTotal = calculateTaxiFare(totalDistance) + extra;
            elements.distance.textContent = totalDistance.toFixed(2);
            elements.totalFare.textContent = finalTotal.toLocaleString('vi-VN');
        }

        async function startTracking() {
            if (isTracking) return;
            isTracking = true;
            elements.statusMessage.textContent = "🛰️ ĐANG TÍNH TIỀN...";
            elements.stopButton.style.display = 'block';
            
            await requestWakeLock(); // Kích hoạt giữ màn hình sáng
            
            watchId = navigator.geolocation.watchPosition(
                (pos) => {
                    const { latitude, longitude, accuracy } = pos.coords;
                    if (accuracy > 60) return;
                    if (lastLat !== null) {
                        const R = 6371;
                        const dLat = (latitude - lastLat) * Math.PI / 180;
                        const dLon = (longitude - lastLon) * Math.PI / 180;
                        const a = Math.sin(dLat/2)**2 + Math.cos(lastLat*Math.PI/180)*Math.cos(latitude*Math.PI/180)*Math.sin(dLon/2)**2;
                        const delta = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                        if (delta > 0.007) totalDistance += delta;
                    }
                    lastLat = latitude; lastLon = longitude;
                    updateDisplay();
                },
                (err) => { elements.statusMessage.textContent = "❌ Lỗi GPS: " + err.message; },
                { enableHighAccuracy: true }
            );
        }

        elements.stopButton.addEventListener('click', async () => {
            if (totalDistance > 0.1) {
                const history = JSON.parse(localStorage.getItem('taxiHistoryV3') || '[]');
                history.unshift({
                    time: new Date().toLocaleTimeString('vi-VN', {hour:'2-digit', minute:'2-digit'}),
                    km: totalDistance.toFixed(2),
                    total: elements.totalFare.textContent
                });
                localStorage.setItem('taxiHistoryV3', JSON.stringify(history.slice(0, 20)));
                renderHistory();
            }
            navigator.geolocation.clearWatch(watchId);
            if (wakeLock) { await wakeLock.release(); wakeLock = null; } // Thả khóa màn hình
            isTracking = false;
            elements.stopButton.style.display = 'none';
            elements.statusMessage.textContent = "🏁 ĐÃ KẾT THÚC & LƯU.";
        });

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('taxiHistoryV3') || '[]');
            elements.historyList.innerHTML = history.map(t => `
                <div class="history-item flex justify-between">
                    <span><b>${t.time}</b>: ${t.km} km</span>
                    <span class="text-sky-400 font-bold">${t.total}đ</span>
                </div>
            `).join('');
        }

        inputs.forEach(id => elements[id].addEventListener('input', updateDisplay));
        document.getElementById('resetButton').addEventListener('click', () => location.reload());
        document.getElementById('clearHistory').addEventListener('click', () => {
            if(confirm('Xóa hết lịch sử?')) { localStorage.removeItem('taxiHistoryV3'); renderHistory(); }
        });

        window.onload = () => { renderHistory(); setTimeout(startTracking, 2000); };
    </script>
</body>
</html>
